services:
  # ============================================================================
  # PostgreSQL — managed by Render
  # ============================================================================
  - type: pserv
    name: a20-db-backup
    runtime: image
    image:
      image: postgres:16
    plan: starter
    disk:
      name: a20-db-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 10
    envVars:
      - key: POSTGRES_USER
        value: a20_admin
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: a20_app

  # ============================================================================
  # Redis — managed by Render
  # ============================================================================
  - type: redis
    name: a20-redis-backup
    plan: free
    maxmemoryPolicy: noeviction
    ipMask: 0.0.0.0/0

  # ============================================================================
  # FastAPI Web Service
  # ============================================================================
  - type: web
    name: a20-api-backup
    runtime: docker
    repo: https://github.com/a20-ai-thuc-chien/A20-App-165
    branch: main
    plan: standard
    healthCheckPath: /health
    # Fix DATABASE_URL for psycopg3 driver before starting
    startCommand: sh -c 'export DATABASE_URL=$(echo "$DATABASE_URL" | sed "s|^postgresql://|postgresql+psycopg://|") && alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 4'
    envVars:
      # ---- Database (managed by Render) ----
      - key: DATABASE_URL
        fromDatabase:
          name: a20-db-backup
          property: connectionString

      # ---- Redis (managed by Render) ----
      - key: REDIS_URL
        fromService:
          name: a20-redis-backup
          type: redis
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: a20-redis-backup
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: a20-redis-backup
          type: redis
          property: port

      # ---- AI / LLM (verified) ----
      - key: OPENAI_API_KEY
        value: 
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
